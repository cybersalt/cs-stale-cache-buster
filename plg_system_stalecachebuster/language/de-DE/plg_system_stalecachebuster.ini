PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="CSS-Dateien cache-busten"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Dateiänderungs-Zeitstempel zu CSS-Datei-URLs hinzufügen, die keine Cache-Busting-Parameter haben. Dies zwingt Browser, aktuelle Kopien abzurufen, wenn Dateien geändert werden."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="JavaScript-Dateien cache-busten"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Dateiänderungs-Zeitstempel zu JavaScript-Datei-URLs hinzufügen, die keine Cache-Busting-Parameter haben."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="URLs mit vorhandenen Parametern überspringen"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Wenn aktiviert, werden URLs, die bereits einen Query-String haben (wie ?ver=1.0), nicht verändert. Wenn deaktiviert, wird ein Versionsparameter an alle lokalen URLs angehängt."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Pfade ausschließen"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Ein Pfadfragment pro Zeile. Jede URL, die einen aufgelisteten Pfad enthält, wird übersprungen. Beispiel: media/com_jce um alle JCE-Editor-Dateien zu überspringen. Zeilen, die mit # oder ; beginnen, werden ignoriert."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Admin-Caching verhindern"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="No-Cache-Header auf allen Administratorseiten senden. Dies weist Cloudflare und Browser an, das Backend niemals zu cachen, um veraltete oder 404-Administratorseiten zu vermeiden."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Debug-Modus"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Wenn aktiviert, wird ein HTML-Kommentar vor dem schließenden Body-Tag eingefügt, der jede geänderte URL auflistet. Seitenquelltext anzeigen, um das Protokoll zu sehen. In Produktionsumgebungen deaktivieren."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Protokollierung"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Protokollierung aktivieren"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Jede URL-Änderung in eine Datei protokollieren. Nützlich zur Diagnose von Cache-Busting-Problemen. In Produktionsumgebungen deaktivieren, um unnötige Schreibvorgänge zu vermeiden."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Protokoll-Anzeige"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Protokoll anzeigen"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Protokoll herunterladen"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Protokoll leeren"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Sind Sie sicher, dass Sie alle Protokolleinträge löschen möchten?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Protokoll erfolgreich geleert."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Öffnet sich in einem neuen Fenster. Protokollierung muss aktiviert sein."
