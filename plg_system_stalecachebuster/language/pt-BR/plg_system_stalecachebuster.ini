PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Invalidar cache de arquivos CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Adiciona timestamps de modificacao de arquivo aos URLs de arquivos CSS que nao possuem parametros de invalidacao de cache. Isso forca os navegadores a buscar copias atualizadas quando os arquivos mudam."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Invalidar cache de arquivos JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Adiciona timestamps de modificacao de arquivo aos URLs de arquivos JavaScript que nao possuem parametros de invalidacao de cache."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Ignorar URLs com parametros existentes"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Quando ativado, URLs que ja possuem uma string de consulta (como ?ver=1.0) nao serao alterados. Quando desativado, um parametro de versao sera adicionado a todos os URLs locais."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Excluir caminhos"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Um fragmento de caminho por linha. Qualquer URL contendo um caminho listado sera ignorado. Exemplo: media/com_jce para ignorar todos os arquivos do editor JCE. Linhas que comecam com # ou ; sao ignoradas."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Impedir cache da administracao"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Envia cabecalhos no-cache em todas as paginas de administracao. Isso informa ao Cloudflare e aos navegadores para nunca armazenar em cache o backend, prevenindo paginas de administracao obsoletas ou com erro 404."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Modo de depuracao"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Quando ativado, um comentario HTML e adicionado antes da tag de fechamento body listando cada URL que foi modificado. Visualize o codigo-fonte da pagina para ver o log. Desative em producao."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Registro"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Ativar registro"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Registra cada modificacao de URL em um arquivo. Util para diagnosticar problemas de invalidacao de cache. Desative em producao para evitar gravacoes desnecessarias no disco."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Visualizador de log"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Visualizar log"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Baixar log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Limpar log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Tem certeza de que deseja limpar todas as entradas do log?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Log limpo com sucesso."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Abre em uma nova janela. Requer que o registro esteja ativado."
