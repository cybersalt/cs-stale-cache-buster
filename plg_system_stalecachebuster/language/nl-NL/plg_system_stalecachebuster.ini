PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cache-busting voor CSS-bestanden"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Voeg bestandswijzigingstijdstempels toe aan CSS-bestands-URL's die geen cache-bustingparameters hebben. Dit dwingt browsers om nieuwe kopieën op te halen wanneer bestanden wijzigen."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cache-busting voor JavaScript-bestanden"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Voeg bestandswijzigingstijdstempels toe aan JavaScript-bestands-URL's die geen cache-bustingparameters hebben."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="URL's met bestaande parameters overslaan"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Indien ingeschakeld worden URL's die al een querystring hebben (zoals ?ver=1.0) ongewijzigd gelaten. Indien uitgeschakeld wordt een versieparameter aan alle lokale URL's toegevoegd."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Paden uitsluiten"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Eén padfragment per regel. Elke URL die een vermeld pad bevat wordt overgeslagen. Voorbeeld: media/com_jce om alle JCE-editorbestanden over te slaan. Regels die beginnen met # of ; worden genegeerd."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Beheerderscaching voorkomen"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Stuur no-cache headers op alle beheerderspagina's. Dit vertelt Cloudflare en browsers om de backend nooit te cachen, waardoor verouderde of 404-beheerderspagina's worden voorkomen."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Foutopsporingsmodus"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Indien ingeschakeld wordt een HTML-opmerking toegevoegd vóór de afsluitende body-tag met een lijst van elke gewijzigde URL. Bekijk de paginabron om het logboek te zien. Schakel uit in productie."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Logboek"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Logboek inschakelen"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Log elke URL-wijziging naar een bestand. Nuttig voor het diagnosticeren van cache-bustingproblemen. Schakel uit in productie om onnodige schijfbewerkingen te voorkomen."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Logboekweergave"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Logboek bekijken"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Logboek downloaden"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Logboek wissen"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Weet u zeker dat u alle logboekvermeldingen wilt wissen?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Logboek succesvol gewist."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Opent in een nieuw venster. Vereist dat logboek is ingeschakeld."
