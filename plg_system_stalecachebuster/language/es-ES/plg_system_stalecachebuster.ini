PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Invalidar cache de archivos CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Agrega marcas de tiempo de modificacion de archivo a las URLs de archivos CSS que carecen de parametros de invalidacion de cache. Esto obliga a los navegadores a obtener copias actualizadas cuando los archivos cambian."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Invalidar cache de archivos JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Agrega marcas de tiempo de modificacion de archivo a las URLs de archivos JavaScript que carecen de parametros de invalidacion de cache."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Omitir URLs con parametros existentes"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Cuando esta activado, las URLs que ya tienen una cadena de consulta (como ?ver=1.0) no se modificaran. Cuando esta desactivado, se agregara un parametro de version a todas las URLs locales."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Excluir rutas"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Un fragmento de ruta por linea. Cualquier URL que contenga una ruta listada sera omitida. Ejemplo: media/com_jce para omitir todos los archivos del editor JCE. Las lineas que comienzan con # o ; se ignoran."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Prevenir cache del administrador"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Enviar encabezados no-cache en todas las paginas del administrador. Esto indica a Cloudflare y a los navegadores que nunca almacenen en cache el backend, evitando paginas de administracion obsoletas o con error 404."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Modo de depuracion"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Cuando esta activado, se agrega un comentario HTML antes de la etiqueta de cierre body que lista cada URL que fue modificada. Vea el codigo fuente de la pagina para ver el registro. Desactive en produccion."

; Registro (Logging)
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Registro"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Activar registro"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Registrar cada modificacion de URL en un archivo. Util para diagnosticar problemas de invalidacion de cache. Desactive en produccion para evitar escrituras innecesarias en disco."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Visor de registro"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Ver registro"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Descargar registro"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Limpiar registro"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Esta seguro de que desea borrar todas las entradas del registro?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Registro limpiado exitosamente."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Se abre en una nueva ventana. Requiere que el registro este activado."
