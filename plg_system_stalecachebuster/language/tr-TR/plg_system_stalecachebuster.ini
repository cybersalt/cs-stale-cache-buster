PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Mevcut Parametreli URL'leri Atla"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Etkinleştirildiğinde, zaten bir sorgu dizesi olan URL'ler (örneğin ?ver=1.0) değiştirilmeden bırakılır. Devre dışı bırakıldığında, tüm yerel URL'lere bir sürüm parametresi eklenir."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Hariç Tutulan Yollar"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Her satırda bir yol parçası. Listelenen bir yolu içeren herhangi bir URL atlanır. Örnek: Tüm JCE düzenleyici dosyalarını atlamak için media/com_jce. # veya ; ile başlayan satırlar yoksayılır."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Yönetici Önbelleğini Engelle"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Tüm yönetici sayfalarında önbellek engelleme başlıkları gönderir. Bu, Cloudflare ve tarayıcılara arka ucu asla önbelleğe almamalarını söyleyerek eski veya 404 yönetici sayfalarını önler."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Hata Ayıklama Modu"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Etkinleştirildiğinde, kapanış body etiketinden önce değiştirilen her URL'yi listeleyen bir HTML yorumu eklenir. Günlüğü görmek için sayfa kaynağını görüntüleyin. Üretim ortamında kapatın."
