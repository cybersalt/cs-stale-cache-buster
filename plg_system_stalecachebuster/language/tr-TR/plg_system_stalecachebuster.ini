PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="CSS Dosyalarının Önbelleğini Kır"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Önbellek kırma parametresi bulunmayan CSS dosya URL'lerine dosya değişiklik zaman damgaları ekler. Bu, dosyalar değiştiğinde tarayıcıları güncel kopyaları almaya zorlar."
