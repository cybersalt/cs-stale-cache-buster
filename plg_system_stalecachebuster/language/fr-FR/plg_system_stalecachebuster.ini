PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cache-bust des fichiers CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Ajouter des horodatages de modification de fichier aux URL de fichiers CSS qui n'ont pas de paramètres de cache-busting. Cela force les navigateurs à récupérer des copies à jour lorsque les fichiers changent."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cache-bust des fichiers JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Ajouter des horodatages de modification de fichier aux URL de fichiers JavaScript qui n'ont pas de paramètres de cache-busting."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Ignorer les URL avec des paramètres existants"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Lorsque cette option est activée, les URL qui ont déjà une chaîne de requête (comme ?ver=1.0) ne seront pas modifiées. Lorsqu'elle est désactivée, un paramètre de version sera ajouté à toutes les URL locales."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Chemins à exclure"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Un fragment de chemin par ligne. Toute URL contenant un chemin listé sera ignorée. Exemple : media/com_jce pour ignorer tous les fichiers de l'éditeur JCE. Les lignes commençant par # ou ; sont ignorées."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Empêcher la mise en cache de l'administration"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Envoyer des en-têtes no-cache sur toutes les pages d'administration. Cela indique à Cloudflare et aux navigateurs de ne jamais mettre en cache le backend, évitant ainsi les pages d'administration obsolètes ou en erreur 404."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Mode Debug"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Lorsque cette option est activée, un commentaire HTML est ajouté avant la balise body fermante, listant chaque URL modifiée. Affichez le code source de la page pour voir le journal. Désactivez en production."

