PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Journalisation"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Activer la journalisation"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Enregistrer chaque modification d'URL dans un fichier. Utile pour diagnostiquer les problèmes de cache-busting. Désactivez en production pour éviter les écritures disque inutiles."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Visionneuse de journal"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Voir le journal"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Télécharger le journal"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Effacer le journal"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Êtes-vous sûr de vouloir effacer toutes les entrées du journal ?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Journal effacé avec succès."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="S'ouvre dans une nouvelle fenêtre. La journalisation doit être activée."
