PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cache-bust CSS Files"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Add file-modification timestamps to CSS file URLs that lack cache-busting parameters. This forces browsers to fetch fresh copies when files change."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cache-bust JavaScript Files"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Add file-modification timestamps to JavaScript file URLs that lack cache-busting parameters."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Skip URLs with Existing Parameters"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="When enabled, URLs that already have a query string (like ?ver=1.0) will be left unchanged. When disabled, a version parameter will be appended to all local URLs."
