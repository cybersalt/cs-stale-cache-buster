PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cache-bust CSS Files"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Add file-modification timestamps to CSS file URLs that lack cache-busting parameters. This forces browsers to fetch fresh copies when files change."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cache-bust JavaScript Files"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Add file-modification timestamps to JavaScript file URLs that lack cache-busting parameters."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Skip URLs with Existing Parameters"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="When enabled, URLs that already have a query string (like ?ver=1.0) will be left unchanged. When disabled, a version parameter will be appended to all local URLs."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Exclude Paths"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="One path fragment per line. Any URL containing a listed path will be skipped. Example: media/com_jce to skip all JCE editor files. Lines starting with # or ; are ignored."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Prevent Admin Caching"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Send no-cache headers on all administrator pages. This tells Cloudflare and browsers to never cache the backend, preventing stale or 404 admin pages."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Debug Mode"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="When enabled, an HTML comment is added before the closing body tag listing every URL that was modified. View page source to see the log. Turn off in production."

; Logging fieldset
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Logging"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Enable Logging"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Log every URL modification to a file. Useful for diagnosing cache-busting issues. Disable in production to avoid unnecessary disk writes."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Log Viewer"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="View Log"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Download Log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Clear Log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Are you sure you want to clear all log entries?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Log cleared successfully."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Opens in a new window. Requires logging to be enabled."
