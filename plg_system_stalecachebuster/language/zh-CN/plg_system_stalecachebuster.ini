PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="CSS 文件缓存清除"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="为缺少缓存清除参数的 CSS 文件 URL 添加文件修改时间戳。这将强制浏览器在文件更改时获取最新副本。"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="JavaScript 文件缓存清除"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="为缺少缓存清除参数的 JavaScript 文件 URL 添加文件修改时间戳。"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="跳过已有参数的 URL"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="启用后，已有查询字符串的 URL（如 ?ver=1.0）将保持不变。禁用后，版本参数将附加到所有本地 URL。"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="排除路径"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="每行一个路径片段。包含所列路径的任何 URL 将被跳过。示例：media/com_jce 可跳过所有 JCE 编辑器文件。以 # 或 ; 开头的行将被忽略。"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="防止后台缓存"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="在所有管理页面上发送 no-cache 标头。这会告知 Cloudflare 和浏览器永不缓存后台，防止出现过期或 404 管理页面。"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="调试模式"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="启用后，会在关闭 body 标签之前添加一个 HTML 注释，列出所有被修改的 URL。查看页面源代码以查看日志。请在生产环境中关闭此功能。"

