PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Invalida cache file CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Aggiunge timestamp di modifica file agli URL dei file CSS privi di parametri di invalidamento cache. Questo obbliga i browser a scaricare copie aggiornate quando i file cambiano."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Invalida cache file JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Aggiunge timestamp di modifica file agli URL dei file JavaScript privi di parametri di invalidamento cache."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Ignora URL con parametri esistenti"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Quando abilitato, gli URL che hanno gia una stringa di query (come ?ver=1.0) non verranno modificati. Quando disabilitato, un parametro di versione verra aggiunto a tutti gli URL locali."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Percorsi da escludere"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Un frammento di percorso per riga. Qualsiasi URL contenente un percorso elencato verra ignorato. Esempio: media/com_jce per ignorare tutti i file dell'editor JCE. Le righe che iniziano con # o ; vengono ignorate."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Impedisci cache amministrazione"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Invia intestazioni no-cache su tutte le pagine di amministrazione. Questo indica a Cloudflare e ai browser di non memorizzare mai nella cache il backend, prevenendo pagine di amministrazione obsolete o con errore 404."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Modalita debug"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Quando abilitato, viene aggiunto un commento HTML prima del tag di chiusura body che elenca ogni URL modificato. Visualizza il sorgente della pagina per vedere il log. Disattivare in produzione."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Registrazione"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Abilita registrazione"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Registra ogni modifica URL in un file. Utile per diagnosticare problemi di invalidamento cache. Disabilitare in produzione per evitare scritture su disco non necessarie."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Visualizzatore log"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Visualizza log"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Scarica log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Cancella log"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Sei sicuro di voler cancellare tutte le voci del log?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Log cancellato con successo."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Si apre in una nuova finestra. Richiede che la registrazione sia abilitata."
