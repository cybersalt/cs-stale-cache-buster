PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cache-bust plików CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Dodaje znaczniki czasu modyfikacji pliku do URL plików CSS, które nie mają parametrów cache-busting. Wymusza to na przeglądarkach pobranie aktualnych kopii po zmianie plików."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cache-bust plików JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Dodaje znaczniki czasu modyfikacji pliku do URL plików JavaScript, które nie mają parametrów cache-busting."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Pomijaj URL z istniejącymi parametrami"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Po włączeniu, URL które już mają ciąg zapytania (np. ?ver=1.0) nie będą zmieniane. Po wyłączeniu, parametr wersji zostanie dodany do wszystkich lokalnych URL."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Wykluczone ścieżki"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Jeden fragment ścieżki na linię. Każdy URL zawierający wymienioną ścieżkę zostanie pominięty. Przykład: media/com_jce aby pominąć wszystkie pliki edytora JCE. Linie zaczynające się od # lub ; są ignorowane."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Zapobiegaj buforowaniu panelu administracyjnego"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Wysyła nagłówki no-cache na wszystkich stronach administracyjnych. Informuje to Cloudflare i przeglądarki, aby nigdy nie buforowały backendu, zapobiegając nieaktualnym lub błędnym stronom 404 w panelu administracyjnym."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Tryb debugowania"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Po włączeniu, komentarz HTML jest dodawany przed zamykającym znacznikiem body, wymieniając każdy zmodyfikowany URL. Wyświetl źródło strony, aby zobaczyć dziennik. Wyłącz w środowisku produkcyjnym."

