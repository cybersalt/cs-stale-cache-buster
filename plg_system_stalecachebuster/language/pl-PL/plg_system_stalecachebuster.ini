PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Rejestrowanie"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Włącz rejestrowanie"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Rejestruje każdą modyfikację URL w pliku. Przydatne do diagnozowania problemów z cache-busting. Wyłącz w środowisku produkcyjnym, aby uniknąć zbędnych zapisów na dysku."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Przeglądarka dziennika"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Wyświetl dziennik"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Pobierz dziennik"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Wyczyść dziennik"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Czy na pewno chcesz wyczyścić wszystkie wpisy dziennika?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Dziennik wyczyszczony pomyślnie."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Otwiera się w nowym oknie. Wymaga włączonego rejestrowania."
