PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Сброс кэша файлов CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Добавляет метки времени модификации файлов к URL-адресам файлов CSS, у которых отсутствуют параметры сброса кэша. Это заставляет браузеры загружать обновлённые копии при изменении файлов."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Сброс кэша файлов JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Добавляет метки времени модификации файлов к URL-адресам файлов JavaScript, у которых отсутствуют параметры сброса кэша."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Пропускать URL с существующими параметрами"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Когда включено, URL-адреса, которые уже имеют строку запроса (например, ?ver=1.0), не будут изменены. Когда отключено, параметр версии будет добавлен ко всем локальным URL-адресам."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Исключить пути"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Один фрагмент пути на строку. Любой URL, содержащий указанный путь, будет пропущен. Пример: media/com_jce для пропуска всех файлов редактора JCE. Строки, начинающиеся с # или ;, игнорируются."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Запретить кэширование администрирования"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Отправлять заголовки no-cache на всех страницах администрирования. Это указывает Cloudflare и браузерам никогда не кэшировать бэкенд, предотвращая устаревшие или отсутствующие (404) страницы администрирования."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Режим отладки"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Когда включено, HTML-комментарий добавляется перед закрывающим тегом body со списком всех изменённых URL-адресов. Просмотрите исходный код страницы, чтобы увидеть журнал. Отключите в производственной среде."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Журналирование"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Включить журналирование"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Записывать каждое изменение URL в файл. Полезно для диагностики проблем со сбросом кэша. Отключите в производственной среде, чтобы избежать ненужных записей на диск."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Просмотр журнала"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Просмотреть журнал"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Скачать журнал"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Очистить журнал"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Вы уверены, что хотите очистить все записи журнала?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Журнал успешно очищен."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Открывается в новом окне. Требуется включённое журналирование."
