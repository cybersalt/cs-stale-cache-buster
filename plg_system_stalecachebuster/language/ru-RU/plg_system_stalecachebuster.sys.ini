PLG_SYSTEM_STALECACHEBUSTER="System - CS Stale Cache Buster"
PLG_SYSTEM_STALECACHEBUSTER_DESCRIPTION="Автоматически добавляет метки времени модификации файлов к URL-адресам CSS и JavaScript, у которых отсутствуют параметры сброса кэша. Решает проблемы кэширования браузера с Template Creator CK, Maximenu CK и другими расширениями, которые не включают строки версий в URL-адреса своих ресурсов."
