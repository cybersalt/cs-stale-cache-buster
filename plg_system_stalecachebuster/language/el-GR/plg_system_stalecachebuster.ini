PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Ανανέωση προσωρινής μνήμης αρχείων CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Προσθέτει χρονοσφραγίδες τροποποίησης αρχείων σε URL αρχείων CSS που δεν διαθέτουν παραμέτρους ανανέωσης προσωρινής μνήμης. Αυτό αναγκάζει τους περιηγητές να ανακτούν ενημερωμένα αντίγραφα όταν τα αρχεία αλλάζουν."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Ανανέωση προσωρινής μνήμης αρχείων JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Προσθέτει χρονοσφραγίδες τροποποίησης αρχείων σε URL αρχείων JavaScript που δεν διαθέτουν παραμέτρους ανανέωσης προσωρινής μνήμης."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Παράλειψη URL με υπάρχουσες παραμέτρους"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Όταν είναι ενεργοποιημένο, τα URL που διαθέτουν ήδη συμβολοσειρά ερωτήματος (όπως ?ver=1.0) παραμένουν αμετάβλητα. Όταν είναι απενεργοποιημένο, μια παράμετρος έκδοσης προστίθεται σε όλα τα τοπικά URL."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Εξαίρεση διαδρομών"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Ένα τμήμα διαδρομής ανά γραμμή. Οποιοδήποτε URL περιέχει μια καταχωρημένη διαδρομή θα παραλειφθεί. Παράδειγμα: media/com_jce για παράλειψη όλων των αρχείων του επεξεργαστή JCE. Οι γραμμές που ξεκινούν με # ή ; αγνοούνται."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Αποτροπή προσωρινής αποθήκευσης διαχείρισης"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Αποστολή κεφαλίδων μη αποθήκευσης σε όλες τις σελίδες διαχείρισης. Αυτό ενημερώνει το Cloudflare και τους περιηγητές να μην αποθηκεύουν ποτέ το backend, αποτρέποντας παλιές ή 404 σελίδες διαχείρισης."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Λειτουργία εντοπισμού σφαλμάτων"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Όταν είναι ενεργοποιημένο, ένα σχόλιο HTML προστίθεται πριν από την κλείσιμο ετικέτα body, με λίστα κάθε URL που τροποποιήθηκε. Δείτε τον πηγαίο κώδικα της σελίδας για να δείτε το αρχείο καταγραφής. Απενεργοποιήστε το στην παραγωγή."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Καταγραφή"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Ενεργοποίηση καταγραφής"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Καταγραφή κάθε τροποποίησης URL σε αρχείο. Χρήσιμο για τη διάγνωση προβλημάτων ανανέωσης προσωρινής μνήμης. Απενεργοποιήστε στην παραγωγή για αποφυγή περιττών εγγραφών στο δίσκο."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Προβολή αρχείου καταγραφής"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Προβολή αρχείου καταγραφής"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Λήψη αρχείου καταγραφής"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Εκκαθάριση αρχείου καταγραφής"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Είστε βέβαιοι ότι θέλετε να διαγράψετε όλες τις καταχωρήσεις του αρχείου καταγραφής;"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Το αρχείο καταγραφής εκκαθαρίστηκε επιτυχώς."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Ανοίγει σε νέο παράθυρο. Απαιτείται η ενεργοποίηση της καταγραφής."
