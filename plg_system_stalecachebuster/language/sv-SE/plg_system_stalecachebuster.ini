PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Cachebryt CSS-filer"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Lägg till filändringstidsstämplar till URL:er för CSS-filer som saknar cachebytningsparametrar. Detta tvingar webbläsare att hämta aktuella kopior när filer ändras."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Cachebryt JavaScript-filer"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Lägg till filändringstidsstämplar till URL:er för JavaScript-filer som saknar cachebytningsparametrar."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Hoppa över URL:er med befintliga parametrar"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="När aktiverat lämnas URL:er som redan har en frågesträng (som ?ver=1.0) oförändrade. När inaktiverat läggs en versionsparameter till alla lokala URL:er."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Exkludera sökvägar"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Ett sökvägsfragment per rad. Alla URL:er som innehåller en listad sökväg hoppas över. Exempel: media/com_jce för att hoppa över alla JCE-redigerarfiler. Rader som börjar med # eller ; ignoreras."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Förhindra admincachning"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Skicka no-cache-huvuden på alla administrationssidor. Detta säger till Cloudflare och webbläsare att aldrig cacha backend, vilket förhindrar inaktuella eller 404-administrationssidor."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Felsökningsläge"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="När aktiverat läggs en HTML-kommentar till före den avslutande body-taggen som listar varje URL som ändrades. Visa sidkällan för att se loggen. Stäng av i produktion."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Loggning"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Aktivera loggning"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Logga varje URL-ändring till en fil. Användbart för att diagnostisera cachebytningsproblem. Inaktivera i produktion för att undvika onödiga diskskrivningar."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Loggvisare"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Visa logg"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Ladda ner logg"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Rensa logg"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Är du säker på att du vill rensa alla loggposter?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Loggen har rensats."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Öppnas i ett nytt fönster. Kräver att loggning är aktiverad."
