PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="Obnovit mezipaměť souborů CSS"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="Přidá časová razítka úprav souborů k URL adresám souborů CSS, které nemají parametry pro obnovu mezipaměti. To donutí prohlížeče stáhnout aktuální kopie při změně souborů."
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="Obnovit mezipaměť souborů JavaScript"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="Přidá časová razítka úprav souborů k URL adresám souborů JavaScript, které nemají parametry pro obnovu mezipaměti."
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="Přeskočit URL s existujícími parametry"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="Pokud je povoleno, URL adresy, které již mají řetězec dotazu (jako ?ver=1.0), zůstanou beze změny. Pokud je zakázáno, ke všem místním URL adresám bude připojen parametr verze."
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="Vyloučené cesty"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="Jeden fragment cesty na řádek. Jakákoli URL adresa obsahující uvedenou cestu bude přeskočena. Příklad: media/com_jce pro přeskočení všech souborů editoru JCE. Řádky začínající # nebo ; jsou ignorovány."
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="Zabránit ukládání administrace do mezipaměti"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="Odesílá hlavičky zabraňující ukládání do mezipaměti na všech stránkách administrace. To říká Cloudflare a prohlížečům, aby nikdy neukládaly backend do mezipaměti, čímž se zabrání zastaralým nebo 404 stránkám administrace."
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="Režim ladění"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="Pokud je povoleno, před uzavírací značku body se přidá HTML komentář se seznamem všech upravených URL adres. Pro zobrazení protokolu si zobrazte zdrojový kód stránky. V produkčním prostředí vypněte."
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="Protokolování"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="Povolit protokolování"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="Zaznamenat každou úpravu URL do souboru. Užitečné pro diagnostiku problémů s obnovováním mezipaměti. V produkčním prostředí zakažte, abyste zabránili zbytečným zápisům na disk."
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="Prohlížeč protokolu"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="Zobrazit protokol"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="Stáhnout protokol"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="Vymazat protokol"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="Opravdu chcete vymazat všechny záznamy protokolu?"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="Protokol byl úspěšně vymazán."
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="Otevře se v novém okně. Vyžaduje povolené protokolování."
