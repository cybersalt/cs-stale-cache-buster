PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_LABEL="CSS ファイルのキャッシュバスト"
PLG_SYSTEM_STALECACHEBUSTER_BUST_CSS_DESC="キャッシュバストパラメータを持たない CSS ファイルの URL にファイル更新タイムスタンプを追加します。これにより、ファイルが変更された際にブラウザが最新のコピーを取得するようになります。"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_LABEL="JavaScript ファイルのキャッシュバスト"
PLG_SYSTEM_STALECACHEBUSTER_BUST_JS_DESC="キャッシュバストパラメータを持たない JavaScript ファイルの URL にファイル更新タイムスタンプを追加します。"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_LABEL="既存のパラメータを持つ URL をスキップ"
PLG_SYSTEM_STALECACHEBUSTER_SKIP_EXISTING_DESC="有効にすると、既にクエリ文字列を持つ URL（例：?ver=1.0）は変更されません。無効にすると、すべてのローカル URL にバージョンパラメータが追加されます。"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_LABEL="除外パス"
PLG_SYSTEM_STALECACHEBUSTER_EXCLUDE_PATHS_DESC="1行に1つのパスフラグメントを入力します。リストされたパスを含む URL はスキップされます。例：media/com_jce と入力すると JCE エディタのすべてのファイルをスキップします。# または ; で始まる行は無視されます。"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_LABEL="管理画面のキャッシュを防止"
PLG_SYSTEM_STALECACHEBUSTER_NO_CACHE_ADMIN_DESC="すべての管理ページで no-cache ヘッダーを送信します。これにより、Cloudflare とブラウザがバックエンドをキャッシュしないようになり、古い管理ページや 404 エラーページを防止します。"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_LABEL="デバッグモード"
PLG_SYSTEM_STALECACHEBUSTER_DEBUG_MODE_DESC="有効にすると、閉じ body タグの前に HTML コメントが追加され、変更されたすべての URL が一覧表示されます。ページのソースを表示してログを確認してください。本番環境ではオフにしてください。"

; Fieldset ログ
PLG_SYSTEM_STALECACHEBUSTER_LOGGING_FIELDSET="ログ"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_LABEL="ログを有効にする"
PLG_SYSTEM_STALECACHEBUSTER_ENABLE_LOGGING_DESC="すべての URL 変更をファイルに記録します。キャッシュバストの問題を診断するのに役立ちます。不要なディスク書き込みを避けるため、本番環境では無効にしてください。"
PLG_SYSTEM_STALECACHEBUSTER_LOG_VIEWER_LABEL="ログビューア"
PLG_SYSTEM_STALECACHEBUSTER_VIEW_LOG="ログを表示"
PLG_SYSTEM_STALECACHEBUSTER_DOWNLOAD_LOG="ログをダウンロード"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_LOG="ログをクリア"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_CONFIRM="すべてのログエントリをクリアしてもよろしいですか？"
PLG_SYSTEM_STALECACHEBUSTER_CLEAR_SUCCESS="ログが正常にクリアされました。"
PLG_SYSTEM_STALECACHEBUSTER_VIEWER_INFO="新しいウィンドウで開きます。ログが有効になっている必要があります。"
